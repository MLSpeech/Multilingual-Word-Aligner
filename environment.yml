name: Mwa_venv
channels:
  - conda-forge
  - defaults
  - pytorch
  - nvidia
dependencies:
  - python=3.11
  - pip
  # Conda packages (ones available in conda channels)
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.15.2
  - matplotlib=3.9.2
  - seaborn=0.13.2
  - scikit-learn=1.6.1
  - pytorch=2.4.0
  - torchaudio=2.4.0
  - torchvision  # Often needed with pytorch
  - cudatoolkit  # If you need CUDA support
  - jupyter
  - ipython
  - tqdm
  - requests
  - pyyaml
  - pip:
    # Packages only available via pip
    - accelerate==0.32.1
    - alembic==1.15.2
    - wandb==0.19.8
    - transformers==4.42.4
    - datasets  # Often used with transformers
    - tokenizers==0.19.1
    - safetensors==0.4.3
    - huggingface-hub==0.23.4
    - librosa==0.10.2.post1
    - soundfile==0.13.1
    - praatio==6.2.0
    - optuna==4.0.0
    - einops==0.8.0
    - gitpython==3.1.44
    - sentry-sdk==2.27.0
    - pydantic==2.11.4
    - pydantic-core==2.33.2
    - sqlalchemy==2.0.40
    - alembic==1.15.2
    - gputil==1.4.0
    - protobuf==5.29.4
    - uroman==1.3.1.1
    - soxr==0.5.0.post1
    - audioread==3.0.1
    - joblib==1.5.0
    - threadpoolctl==3.6.0
    - colorlog==6.9.0
    - pipdeptree==2.26.1
    - nvidia-ml-py3  # Alternative to some nvidia packages